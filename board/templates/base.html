{% load static %}

<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <link rel='stylesheet' type='text/css' href='/static/style.css?{% now "U" %}'>
    <title>{% block title %} {% endblock %}</title>
</head>
<body>
<div class='container'>
    <div class='row'>
        <div class='login-field'>
            login
        </div>
    </div>
    <div class='header-container'>
        <div class='row'>
            <div class='header'>
                <h1>zdalna.info</h1>
            </div>
        </div>
        <div class='row'>
            <div class = 'navbar navbar-expand-lg navbar-light bg-light'>
                <ul class='navbar-nav'>
                    <li class='nav-item'>
                        <a class='nav-item nav-link' href="{% url 'home' %}">
                            MAIN PAGE
                        </a>
                    </li>
                    <li class='nav-item'>
                        <a class='nav-item nav-link' href = "{% url 'all_offers' %}">
                            ALL OFFERS
                        </a>
                    </li>
                    <li class='nav-item'>
                        <a class='nav-item nav-link' href='add/'>
                            ADD OFFER
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <div class='row'>
        {% block content %}

        {% endblock %}
    </div>
</div>

<footer class="text-center text-lg-start bg-light
text-muted mt-4">
<div class="text-center p-4">
© 2022 Copyright -
<a class="text-reset fw-bold text-decoration-none"
target="_blank"
href="https://github.com/tjwnuk">
Tomasz Wnuk
</a> 
</div>
</footer>
</body>
</html>
